app = "klassenraum-io"
primary_region = "ams"

# SQLite lives at /data/klassenraum.db (see Dockerfile). Without this mount,
# every deploy/restart gets a fresh ephemeral disk and the database is empty.
[mounts]
source = "klassenraum_data"
destination = "/data"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 256